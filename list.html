<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24">
        <h1 class="text-3xl text-gray-700 mb-4">Todo List App</h1>
        <div class="flex justify-center mb-4">
            <input type="text" id="todo-input" class="w-full p-2 pl-10 text-sm text-gray-700 border border-gray-200 rounded-lg focus:outline-none focus:ring-gray-500 focus:border-gray-500" placeholder="Add new task">
            <button id="add-btn" class="ml-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg">Add</button>
        </div>
        <ul id="todo-list" class="list-none p-0 m-0">
            <!-- Tasks will be added here -->
        </ul>
    </div>

    <script>
        // Get the input field and add button
        const todoInput = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        // Add event listener to the add button
        addBtn.addEventListener('click', addTask);

        // Function to add a new task
        function addTask() {
            const taskText = todoInput.value.trim();
            if (taskText !== '') {
                const task = document.createElement('li');
                task.classList.add('flex', 'justify-between', 'items-center', 'py-2', 'pl-4', 'pr-6', 'bg-gray-50', 'border', 'border-gray-200', 'rounded-lg', 'mb-2');
                task.innerHTML = `
                    <div class="flex items-center">
                        <input type="checkbox" class="mr-2" id="task-${todoList.children.length}">
                        <label for="task-${todoList.children.length}" class="text-gray-700">${taskText}</label>
                    </div>
                    <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg delete-btn">Delete</button>
                `;
                todoList.appendChild(task);

                // Add event listener to the delete button
                task.querySelector('.delete-btn').addEventListener('click', deleteTask);

                // Add event listener to the checkbox
                task.querySelector('input[type="checkbox"]').addEventListener('change', completeTask);

                // Clear the input field
                todoInput.value = '';
            }
        }

        // Function to delete a task
        function deleteTask(event) {
            const task = event.target.parentNode;
            task.classList.add('animate-pulse', 'bg-red-100');
            setTimeout(() => {
                task.remove();
            }, 500);
        }

        // Function to complete a task
        function completeTask(event) {
            const task = event.target.parentNode.parentNode;
            if (event.target.checked) {
                task.classList.add('bg-green-100', 'text-gray-500');
                task.querySelector('label').classList.add('line-through');
            } else {
                task.classList.remove('bg-green-100', 'text-gray-500');
                task.querySelector('label').classList.remove('line-through');
            }
        }
    </script>
</body>
</html>
